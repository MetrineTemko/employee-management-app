<!DOCTYPE html>
<html>
    <head>
        <title>New Contact Form</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body class="main">
        <div class="links">
            <a href="index.html">Home</a>
            <span>|</span>
            <a href="new-contact.html">Add Contact</a>
            <span>|</span>
            <a href="view-contacts.html">View Contacts Details</a>
        </div>
        <div class="sidebar2">
            <div class="pic">
                <img src="Images/temko.jpeg" alt="profile picture" class="profile">
                <p>Metrine Temko Tallian</p>
                <small style="color: greenyellow;">Online</small>
            </div>
            <hr>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="new-contact.html">Add Contact</a></li>
                <li><a href="view-contacts.html">View Contacts Details</a></li>
            </ul>
        </div>
        <div class="form">
        <h2>New Contact Form</h2>
        <form onsubmit="return validateForm()">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name"><br><br>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email"><br><br>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone"><br><br>

            <label >Gender:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label><br><br>

            <label>Department:</label>
            <select name="department" id="department">
                <option value="hr">Human Resources</option>
                <option value="it">Information Technology</option>
                <option value="finance">Finance</option>
                <option value="marketing">Marketing</option>
                <option value="sales">Sales</option>
            </select><br><br>

            <label>Position:</label>
            <select name="position" id="position">
                <option value="hr manager">HR Manager</option>
                <option value="developer">Web Developer</option>
                <option value="supervisor">Supervisor</option>
                <option value="accountant">Accountant</option>
                <option value="sales executive">Sales Executive</option>
            </select><br><br>

            <input type="submit" value="Submit" class="button">
        </form>
        </div>
        <div id="output"></div>
        <script src="main.js"></script>
    </body>
</html>
